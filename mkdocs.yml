# mkdocs.yml
site_name: Programação Agêntica — Especialização Etho
site_description: Especialização em Programação Agêntica — Universidade Etho
site_author: Universidade Etho — Escola de Tecnologia
site_url: https://etho-university.github.io/especializacao-programacao-agentica/

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
  language: pt

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/etho/especializacao-programacao-agentica

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.tasklist
  - pymdownx.magiclink
  - pymdownx.snippets
  - attr_list
  - md_in_html

docs_dir: docs

