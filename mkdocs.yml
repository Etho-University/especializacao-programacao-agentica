# mkdocs.yml
site_name: Programação Agêntica — Especialização Etho
site_description: Especialização em Programação Agêntica — Universidade Etho
site_author: Universidade Etho — Escola de Tecnologia
site_url: https://etho-university.github.io/especializacao-programacao-agentica/

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tooltips
  language: pt

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/etho/especializacao-programacao-agentica

  analytics:
    provider: google
    property: G-XXXXXXXXXX

  generator: false

  authors:
    Etho University:
      name: Etho University
      description: Universidade Etho — Escola de Tecnologia
      avatar: https://github.com/etho-university.png

plugins:
  - search
  - tags:
      tags_file: tags/index.md
  - blog:
      blog_dir: blog
      post_dir: "{blog}/posts"
      post_date_format: short
      post_url_date_format: yyyy/MM
      post_url_format: "{date}/{slug}"
      archive: true
      categories: true
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      pretty_print: true
  - encryptcontent:
      remember_password: true
      session_storage: true
  - social:
      cards_layout: default
      cards_layout_options:
        background_color: "#3949ab"
        color: "#FFFFFF"
  - print-site:
      add_table_of_contents: true
      toc_title: "Índice"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.magiclink
  - pymdownx.snippets:
      auto_append:
        - includes/glossary-abbr.md
  - attr_list
  - md_in_html
  - abbr
  - footnotes

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/pptx-viewer.js

extra_css:
  - stylesheets/extra.css

docs_dir: docs

